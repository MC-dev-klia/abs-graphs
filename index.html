<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cool Shape Explorer</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
body { font-family: Arial, Helvetica, sans-serif; margin: 20px; background-color: #444;}
#plot { width: 1500px; height: 1500px; color: #fff; background-color: #fff; margin-top: 20px; }
textarea { width: 100%; height: 90px; }
button { margin: 4px; padding: 8px 12px; color: #555; border-radius: 4px;}
.history { margin-top: 10px; }
h2, h3 { color: #eee; font-family: Verdana, Geneva, Tahoma, sans-serif;}
#sliders { color: #eee; }
</style>
</head>
<body>

<h2>Cool Shape Explorer</h2>

<button onclick="randomize()">Randomize Cool Shape</button>
<button onclick="copyEquation()">Copy Equation</button>
<button onclick="loadEquation()">View Pasted Equation</button>

<textarea id="eq"></textarea>

<h3>Raw Equation</h3>
<textarea id="rawEq" readonly></textarea>

<div class="history">
<h3>Last 5 Equations</h3>
<div id="history"></div>
</div>

<div id="plot"></div>

<h3>Parameters</h3>
<div id="sliders"></div>

<script>
let historyList = [];
let current = null;

function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function generateParams(){
    const vals=[-1,0,1];
    return {
        m1: choice([-1,1]),
        m2: choice(vals),
        m3: choice(vals),
        m4: choice([-1,1]),
        m5: choice(vals),
        m6: choice(vals),
        c1: choice(vals),
        c2: choice(vals),
        c3: choice(vals),
        c4: choice(vals),
        c5: choice(vals),
        c6: choice(vals),
        c7: choice(vals),
        R: choice([0.5,1,1.5,2,2.5,3,4])
    };
}

function fmtSigned(v){
    return v>=0 ? "+"+v : ""+v;
}

function toString(p){
return `\\left|${p.m1}\\left|${p.m2}\\left|x${fmtSigned(p.c1)}\\right|+${p.m3}\\left|y${fmtSigned(p.c2)}\\right|+${p.c3}\\right|+${p.m4}\\left|${p.m5}\\left|x${fmtSigned(p.c4)}\\right|+${p.m6}\\left|y${fmtSigned(p.c5)}\\right|+${p.c6}\\right|+${p.c7}\\right|=${p.R}`;
}

function updateHistory(str){
    historyList.unshift(str);
    historyList = historyList.slice(0,5);
    const div=document.getElementById("history");
    div.innerHTML="";
    historyList.forEach(s=>{
        const b=document.createElement("button");
        b.textContent=s.substring(0,60)+"...";
        b.onclick=()=>{
            document.getElementById("eq").value=s;
        };
        div.appendChild(b);
    });
}

function evalF(x,y,p){
    const t1=p.m2*Math.abs(x+p.c1)+p.m3*Math.abs(y+p.c2)+p.c3;
    const t2=p.m5*Math.abs(x+p.c4)+p.m6*Math.abs(y+p.c5)+p.c6;
    return Math.abs(p.m1*Math.abs(t1)+p.m4*Math.abs(t2)+p.c7);
}

function toRawString(p){
    return `
OUTER:
|${p.m1}|
  INNER A:
  |${p.m2} |x${fmtSigned(p.c1)}| + ${p.m3} |y${fmtSigned(p.c2)}| + ${p.c3}|
  INNER B:
  |${p.m4}|
    |${p.m5} |x${fmtSigned(p.c4)}| + ${p.m6} |y${fmtSigned(p.c5)}| + ${p.c6}|
  + ${p.c7}
R = ${p.R}
`;
}

function draw(p){
    const n=250;
    const lim=12;
    const xs=[];
    const ys=[];
    const z=[];

    for(let i=0;i<n;i++){
        let row=[];
        let y=-lim+2*lim*i/(n-1);
        ys.push(y);
        for(let j=0;j<n;j++){
            let x=-lim+2*lim*j/(n-1);
            if(i===0) xs.push(x);
            row.push(evalF(x,y,p)-p.R);
        }
        z.push(row);
    }

    Plotly.newPlot("plot",[{
        x: xs,
        y: ys,
        z: z,
        type:'contour',
        contours:{start:0,end:0,size:1,coloring:'lines'},
        line:{width:2}
    }],{
        title:'Graph',
        xaxis:{scaleanchor:'y'},
        yaxis:{},
        margin:{t:40}
    });
}

function randomize(){
    current = generateParams();
    updateSliders();
    const s=toString(current);
    document.getElementById("eq").value = s;
    updateHistory(s);
    document.getElementById("rawEq").textContent = toRawString(p);
    loadEquation();
}

function copyEquation(){
    navigator.clipboard.writeText(document.getElementById("eq").value);
}

function loadEquation(){

    const s=document.getElementById("eq").value;

    const nums=s.match(/[-+]?\d*\.?\d+/g);

    if(!nums || nums.length!=14){
        alert("Could not parse equation.");
        return;
    }

    current={
        m1:Number(nums[0]),
        m2:Number(nums[1]),
        m3:Number(nums[2]),
        m4:Number(nums[3]),
        m5:Number(nums[4]),
        m6:Number(nums[5]),

        c1:Number(nums[6]),
        c2:Number(nums[7]),
        c3:Number(nums[8]),
        c4:Number(nums[9]),
        c5:Number(nums[10]),
        c6:Number(nums[11]),    
        c7:Number(nums[12]),

        R:Number(nums[13])
    };

    updateHistory(s);

    updateSliders();

    draw(current);

}

const sliderNames=[
"m1","m2","m3","m4","m5","m6",
"c1","c2","c3","c4","c5","c6","c7","R"
];

function createSliders(){

    const div=document.getElementById("sliders");

    sliderNames.forEach(name=>{

        const row=document.createElement("div");

        row.innerHTML=`
        <label>${name}</label>

        <input
        id="${name}"
        type="range"
        min="${name=="R"?0.5:-1}"
        max="${name=="R"?4:1}"
        step="${name=="R"?0.5:1}"
        oninput="sliderChanged()">

        <span id="${name}Value"></span>
        `;

        div.appendChild(row);

    });

}

function updateSliders(){
    sliderNames.forEach(name=>{
        document.getElementById(name).value=current[name];
        document.getElementById(name+"Value").innerText=current[name];
    });
}

function sliderChanged(){
    sliderNames.forEach(name=>{
        current[name]=Number(document.getElementById(name).value);
        document.getElementById(name+"Value").innerText=current[name];
    });
    const s=toString(current);
    document.getElementById("eq").value=s;
    draw(current);
}

createSliders();
randomize();
</script>

</body>
</html>
